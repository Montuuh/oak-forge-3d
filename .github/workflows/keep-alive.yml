name: Supabase keep-alive

on:
    schedule:
        - cron: "0 7 */2 * *"
    workflow_dispatch:

jobs:
    ping:
        runs-on: ubuntu-latest
        steps:
            - name: Ping keep-alive endpoint
              env:
                  KEEP_ALIVE_URL: ${{ vars.KEEP_ALIVE_URL }}
                  CRON_SECRET: ${{ secrets.CRON_SECRET }}
              run: |
                  if [ -z "$KEEP_ALIVE_URL" ]; then
                    echo "Missing repository variable KEEP_ALIVE_URL (e.g. https://your-app.vercel.app/api/cron/keep-alive)"
                    exit 1
                  fi
                  if [ -z "$CRON_SECRET" ]; then
                    echo "Missing repository secret CRON_SECRET"
                    exit 1
                  fi
                  curl -fsS \
                    -H "Authorization: Bearer ${CRON_SECRET}" \
                    "$KEEP_ALIVE_URL"
